<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — Tez Bozor Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f8f9fa] flex items-center justify-center p-4 font-sans antialiased">

  <div class="w-full max-w-[400px]">

    <!-- Logo card -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-[#00964b] rounded-2xl flex items-center justify-center shadow-xl shadow-[#00964b]/30 mb-4">
        <svg class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-black text-[#1e252b]">Tez Bozor</h1>
      <p class="text-gray-400 text-sm font-medium mt-1">Admin paneliga kirish</p>
    </div>

    <!-- Form card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      {% if error %}
        <div class="mb-5 px-4 py-3 bg-red-50 border border-red-200 text-red-600 text-sm font-semibold rounded-xl">
          {{ error }}
        </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
            Foydalanuvchi nomi
          </label>
          <input type="text" name="username" autofocus required
                 class="w-full bg-[#f4f6f9] rounded-xl px-4 py-3.5 text-[#1e252b] placeholder-gray-400 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#00964b] border-0"
                 placeholder="admin">
        </div>

        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">
            Parol
          </label>
          <div class="relative">
            <input type="password" name="password" id="pwInput" required
                   class="w-full bg-[#f4f6f9] rounded-xl px-4 py-3.5 pr-12 text-[#1e252b] placeholder-gray-400 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#00964b] border-0"
                   placeholder="••••••••">
            <button type="button" onclick="togglePw()"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#00964b] transition-colors">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit"
                class="w-full bg-[#00964b] hover:bg-[#008542] text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-[#00964b]/20 mt-2">
          Kirish
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Tez Bozor &copy; 2026</p>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('pwInput');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
