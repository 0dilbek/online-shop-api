server {
    listen 80;
    server_name _;  # IP bilan ishlaydi, keyinroq domain qo'shiladi

    client_max_body_size 20M;

    # Static fayllar
    location /static/ {
        alias /home/online-shop-api/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media fayllar
    location /media/ {
        alias /home/online-shop-api/media/;
        expires 7d;
    }

    # Django app
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
    }
}
